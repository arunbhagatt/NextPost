<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Job Details | NextPost</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <div class="logo-section">

            <img
            src="assets/logo.png"
            class="logo"
            alt="Logo">

            <div>

                <h1>NextPost</h1>

                <p>
                    Jobs • Exams • Opportunities
                </p>

            </div>

        </div>

    </header>

    <div
    id="jobDetails"
    class="job-card">

        Loading...

    </div>

</div>

<script>

const jobId =
localStorage.getItem(
"selectedJob"
);

fetch("jobs.json")

.then(response =>
response.json())

.then(jobs => {

    const job =
    jobs.find(
    j => j.id == jobId
    );

    if(!job){

        document.getElementById(
        "jobDetails"
        ).innerHTML =

        "<h2>Job not found</h2>";

        return;
    }

    document.getElementById(
    "jobDetails"
    ).innerHTML =

    `

    <div class="job-title">

        ${job.title}

    </div>

    <div class="badge">

        🎯 Matches Your Profile

    </div>

    <hr style="
    margin:15px 0">

    <p>
    <strong>Organization:</strong>
    ${job.organization}
    </p>

    <br>

    <p>
    <strong>Qualification:</strong>
${job.qualification.join(", ")}
    </p>

    <br>

    <p>
    <strong>Vacancies:</strong>
    ${job.vacancies}
    </p>

    <br>

    <p>
    <strong>Age Limit:</strong>
    ${job.ageLimit}
    </p>

    <br>

    <p>
    <strong>Last Date:</strong>
    ${job.lastDate}
    </p>

    <br>

    <p>
    <strong>Exam Date:</strong>
    ${job.examDate}
    </p>

    <br>

    <p>
    <strong>Selection Process:</strong>
    ${job.selectionProcess}
    </p>

    <br>

    <div
    style="
    background:#eff6ff;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;">

        <strong>
        🎯 Why am I seeing this?
        </strong>

        <br><br>

        This opportunity
        matches your selected
        qualification and
        interests.

    </div>

    <a
    href="${job.notificationLink}"
    target="_blank">

        <button
        class="view-btn">

            Official Notification

        </button>

    </a>

    <br><br>

    <a
    href="${job.applyLink}"
    target="_blank">

        <button
        class="view-btn">

            Apply Online

        </button>

    </a>

    <br><br>

    <a
    href="${job.officialWebsite}"
    target="_blank">

        <button
        class="view-btn">

            Official Website

        </button>

    </a>

    `;

});

</script>

</body>

</html>
